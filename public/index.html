<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-body-tertiary">

    <div class="container py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center pb-3 mb-4 border-bottom">
            <h1 class="h3 mb-0 fw-bold text-gold">Memoora</h1>
            
            <div class="d-flex gap-3 align-items-center">
                <input type="text" id="searchInput" class="form-control bg-dark" placeholder="Cari catatan..." style="width: 250px;">
                <select id="statusFilter" class="form-select bg-dark" style="width: auto;">
                    <option value="all">Semua Status</option>
                    <option value="pending">Belum Selesai</option>
                    <option value="completed">Selesai</option>
                </select>
                <button id="addNoteBtn" class="btn btn-gold fw-bold">Catatan Baru</button>
            </div>
        </header>

        <ul class="nav nav-tabs mb-4 border-secondary">
            <li class="nav-item">
                <button id="navNotes" class="nav-link active fw-bold text-light" style="cursor: pointer;">Notes</button>
            </li>
            <li class="nav-item">
                <button id="navFolders" class="nav-link fw-bold text-secondary" style="cursor: pointer;">Folders</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-secondary" style="cursor: pointer;">Collabs</button>
            </li>
        </ul>

        <div id="notesContainer" class="row g-4">
            </div>
    </div>

    <div id="noteModal" class="custom-modal-overlay" style="display: none;">
        <div class="card bg-dark border-secondary p-4 w-100" style="max-width: 500px;">
            <h4 class="mb-4 text-gold">Buat Catatan Baru</h4>
            <form id="noteForm">
                <input type="text" id="noteTitle" class="form-control mb-3" placeholder="Judul Catatan" required>
                <textarea id="noteDesc" class="form-control mb-3" placeholder="Deskripsi..." rows="4" required></textarea>
                
                <select id="noteFolder" class="form-select mb-3">
                    <option value="">Pilih Folder (Opsional)</option>
                    </select>

                <div class="row g-2 mb-4">
                    <div class="col"><input type="date" id="noteDate" class="form-control" required></div>
                    <div class="col">
                        <select id="noteTag" class="form-select">
                            <option value="normal">Normal</option>
                            <option value="urgent">Urgent</option>
                            <option value="review">Review</option>
                            <option value="project">Project</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="cancelNoteBtn" class="btn btn-outline-light">Batal</button>
                    <button type="submit" class="btn btn-gold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="folderModal" class="custom-modal-overlay" style="display: none;">
        <div class="card bg-dark border-secondary p-4 w-100" style="max-width: 500px;">
            <h4 class="mb-4 text-gold">Buat Folder Baru</h4>
            <form id="folderForm">
                <input type="text" id="folderName" class="form-control mb-4" placeholder="Nama Folder" required>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="cancelFolderBtn" class="btn btn-outline-light">Batal</button>
                    <button type="submit" class="btn btn-gold">Simpan Folder</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
