<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-body-tertiary">

    <div class="container py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center pb-3 mb-4 border-bottom">
            <h1 class="h3 mb-0 fw-bold text-gold">Memoora</h1>
            
            <div class="d-flex gap-3 align-items-center">
                <input type="text" id="searchInput" class="form-control bg-dark border-secondary text-light" placeholder="Cari catatan..." style="width: 250px;">
                <select id="statusFilter" class="form-select bg-dark border-secondary text-light" style="width: auto;">
                    <option value="all">Semua Status</option>
                    <option value="pending">Belum Selesai</option>
                    <option value="completed">Selesai</option>
                </select>
                <button id="addNoteBtn" class="btn btn-gold fw-bold">Catatan Baru</button>
                
                <div id="userAvatar" class="user-avatar" role="button" title="Pengaturan Akun" style="width: 40px; height: 40px; border-radius: 50%; background-color: #f39c12; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    ?
                </div>
            </div>
        </header>

        <ul class="nav nav-tabs mb-4 border-secondary">
            <li class="nav-item">
                <button id="navNotes" class="nav-link active fw-bold text-light border-secondary" style="cursor: pointer; background-color: transparent;">Notes</button>
            </li>
            <li class="nav-item">
                <button id="navFolders" class="nav-link fw-bold text-secondary border-0" style="cursor: pointer; background-color: transparent;">Folders</button>
            </li>
            <li class="nav-item">
                <button id="navCollabs" class="nav-link fw-bold text-secondary border-0" style="cursor: pointer; background-color: transparent;">Collabs</button>
            </li>
        </ul>

        <div id="notesContainer" class="row g-4">
        </div>
    </div>

    <div id="noteModal" class="custom-modal-overlay" style="display: none; z-index: 1050;">
        <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 500px;">
            <h4 class="mb-4 text-gold fw-bold">Buat Catatan Baru</h4>
            <form id="noteForm">
                <input type="text" id="noteTitle" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Judul Catatan" required>
                <textarea id="noteDesc" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Deskripsi..." rows="4" required></textarea>
                
                <select id="noteFolder" class="form-select bg-dark border-secondary text-light mb-3">
                    <option value="">-- Pilih Folder (Opsional) --</option>
                </select>

                <div class="row g-2 mb-4">
                    <div class="col"><input type="date" id="noteDate" class="form-control bg-dark border-secondary text-light" required></div>
                    <div class="col">
                        <select id="noteTag" class="form-select bg-dark border-secondary text-light">
                            <option value="normal">Normal</option>
                            <option value="urgent">Urgent</option>
                            <option value="review">Review</option>
                            <option value="project">Project</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="cancelNoteBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
                    <button type="submit" class="btn btn-gold fw-bold px-4">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="folderModal" class="custom-modal-overlay" style="display: none; z-index: 1050;">
        <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px;">
            <h4 class="mb-4 text-gold fw-bold">Buat Folder Baru</h4>
            <form id="folderForm">
                <input type="text" id="folderName" class="form-control bg-dark border-secondary text-light mb-4" placeholder="Nama Folder" required>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="cancelFolderBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
                    <button type="submit" class="btn btn-gold fw-bold px-4">Simpan Folder</button>
                </div>
            </form>
        </div>
    </div>

    <div id="collabModal" class="custom-modal-overlay" style="display: none; z-index: 1050;">
        <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 450px;">
            <h4 class="mb-4 text-gold fw-bold">Undang Kolaborator</h4>
            <form id="collabForm">
                <input type="email" id="collabEmail" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Email teman (contoh: budi@mikroskil.ac.id)" required>
                <select id="collabRole" class="form-select bg-dark border-secondary text-light mb-4">
                    <option value="viewer">Hanya Melihat (Viewer)</option>
                    <option value="editor">Bisa Mengedit (Editor)</option>
                </select>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="cancelCollabBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
                    <button type="submit" class="btn btn-gold fw-bold px-4">Kirim Undangan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="settingsModal" class="custom-modal-overlay" style="display: none; z-index: 1100;">
        <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px; position: relative;">
            <button type="button" id="closeSettingsBtn" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" aria-label="Close" style="font-size: 0.8rem;"></button>
            <h4 class="mb-4 text-gold fw-bold text-center">Pengaturan Akun</h4>
            <form id="settingsForm">
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold mb-1">Username Baru</label>
                    <input type="text" id="editUsername" class="form-control bg-dark border-secondary text-light" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold mb-1">Email Baru</label>
                    <input type="email" id="editEmail" class="form-control bg-dark border-secondary text-light" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-gold small fw-bold mb-1">Password Baru (Kosongkan jika tidak ganti)</label>
                    <input type="password" id="editPassword" class="form-control bg-dark border-secondary text-light" placeholder="••••••••">
                </div>
                
                <div class="d-flex flex-column gap-3">
                    <button type="submit" class="btn btn-gold fw-bold w-100 py-2">Simpan</button>
                    <hr class="border-secondary my-1 w-100">
                    <div class="d-flex gap-2 w-100">
                        <button type="button" id="logoutSettingsBtn" class="btn btn-outline-warning flex-fill fw-bold py-2">Logout</button>
                        <button type="button" id="deleteAccountSettingsBtn" class="btn btn-outline-danger flex-fill fw-bold py-2">Hapus Akun</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="customConfirmModal" class="custom-modal-overlay" style="display: none; z-index: 2000;">
        <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px;">
            <h4 id="confirmTitle" class="mb-3 text-gold fw-bold">Konfirmasi</h4>
            <p id="confirmText" class="text-light mb-4" style="font-size: 0.95rem;">Apakah Anda yakin?</p>
            <input type="text" id="confirmInput" class="form-control bg-dark border-secondary text-light mb-4 text-center fw-bold" style="display: none; letter-spacing: 2px;" placeholder="Ketik HAPUS">
            <div class="d-flex justify-content-end gap-2 mt-2">
                <button type="button" id="btnConfirmCancel" class="btn btn-outline-light fw-bold px-4">Batal</button>
                <button type="button" id="btnConfirmOk" class="btn btn-gold fw-bold px-4">Ya</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
