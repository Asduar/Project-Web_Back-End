<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoora | Project UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="app-container">
        <header class="glass-header">
            <h1 class="blink-gold">Memoora</h1>
            
            <div class="header-right">
                <div class="controls">
                    <input type="text" id="searchInput" class="glass-input" placeholder="Cari catatan...">
                    <select id="statusFilter" class="glass-input">
                        <option value="all">Semua Status</option>
                        <option value="pending">Belum Selesai</option>
                        <option value="completed">Selesai</option>
                    </select>
                    <button id="addNoteBtn" class="btn-gold blink-bg">Catatan Baru</button>
                </div>
                
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=FFD700&color=000&bold=true" alt="User Profile" class="avatar">
                </div>
            </div>
        </header>

        <nav class="glass-nav">
            <button class="nav-btn active">Notes</button>
            <button class="nav-btn">Folders</button>
            <button class="nav-btn">Collabs</button>
        </nav>

        <main id="notesContainer" class="masonry-grid">
        <main id="notesContainer" class="masonry-grid">
            </main>
    </div>

    <div id="noteModal" class="modal-overlay" style="display: none;">
        <div class="modal-glass">
            <h2 class="blink-gold">Buat Catatan Baru</h2>
            <form id="noteForm">
                <input type="text" id="noteTitle" class="glass-input" placeholder="Judul Catatan" required>
                <textarea id="noteDesc" class="glass-input" placeholder="Deskripsi..." rows="4" required></textarea>
                
                <div class="form-row">
                    <input type="date" id="noteDate" class="glass-input" required>
                    <select id="noteTag" class="glass-input">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgent</option>
                        <option value="review">Review</option>
                        <option value="project">Project</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelNoteBtn" class="btn-ghost">Batal</button>
                    <button type="submit" class="btn-gold blink-bg">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="folderModal" class="modal-overlay" style="display: none;">
        <div class="modal-glass">
            <h2>📁 Buat Folder Baru</h2>
            <form id="folderForm">
                <input type="text" id="folderName" class="glass-input" placeholder="Nama Folder (Contoh: Kuliah, Pribadi, Project)" required>
                
                <div class="modal-actions">
                    <button type="button" id="cancelFolderBtn" class="btn-ghost">Batal</button>
                    <button type="submit" class="btn-gold">Simpan Folder</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
