<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoora | Project UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="app-container">
        <header class="glass-header">
            <h1 class="blink-gold">Memoora</h1>
            
            <div class="header-right">
                <div class="controls">
                    <input type="text" id="searchInput" class="glass-input" placeholder="Cari catatan...">
                    <select id="statusFilter" class="glass-input">
                        <option value="all">Semua Status</option>
                        <option value="pending">Belum Selesai</option>
                        <option value="completed">Selesai</option>
                    </select>
                    <button id="addNoteBtn" class="btn-gold blink-bg">Catatan Baru</button>
                </div>
                
                <div class="user-profile" onclick="openSettings()" title="Pengaturan Akun" style="cursor: pointer;">
                    <img src="" id="userAvatar" alt="User Profile" class="avatar">
                </div>
            </div>
        </header>

        <nav class="glass-nav">
            <button class="nav-btn active">Notes</button>
            <button class="nav-btn">Folders</button>
            <button class="nav-btn">Collabs</button>
        </nav>

        <main id="notesContainer" class="masonry-grid">
            </main>
    </div>

    <div id="noteModal" class="modal-overlay" style="display: none;">
        <div class="modal-glass">
            <h2 class="blink-gold">Buat Catatan Baru</h2>
            <form id="noteForm">
                <input type="text" id="noteTitle" class="glass-input" placeholder="Judul Catatan" required>
                <textarea id="noteDesc" class="glass-input" placeholder="Deskripsi..." rows="4" required></textarea>
                
                <div class="form-row">
                    <input type="date" id="noteDate" class="glass-input" required>
                    <select id="noteTag" class="glass-input">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgent</option>
                        <option value="review">Review</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelNoteBtn" class="btn-ghost">Batal</button>
                    <button type="submit" class="btn-gold blink-bg">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal-glass">
            <h2 class="blink-gold">Pengaturan Akun</h2>
            <form id="settingsForm">
                <div style="margin-bottom: 1rem;">
                    <label style="color: var(--gold-primary); font-size: 0.8rem; display: block; margin-bottom: 5px;">Username Baru</label>
                    <input type="text" id="editUsername" class="glass-input" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="color: var(--gold-primary); font-size: 0.8rem; display: block; margin-bottom: 5px;">Email Baru</label>
                    <input type="email" id="editEmail" class="glass-input" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="color: var(--gold-primary); font-size: 0.8rem; display: block; margin-bottom: 5px;">Password Baru (Kosongkan jika tidak ganti)</label>
                    <input type="password" id="editPassword" class="glass-input" placeholder="••••••••">
                </div>
                
                <div class="modal-actions" style="display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; gap: 10px; width: 100%;">
                        <button type="button" onclick="closeSettings()" class="btn-ghost" style="flex: 1;">Batal</button>
                        <button type="submit" class="btn-gold blink-bg" style="flex: 1;">Simpan</button>
                    </div>
                    <hr style="border: 0.5px solid rgba(255,215,0,0.1); width: 100%; margin: 5px 0;">
                    
                    <div style="display: flex; gap: 10px; width: 100%;">
                        <button type="button" onclick="logout()" class="btn-ghost" style="flex: 1; border-color: var(--gold-primary);">Logout</button>
                        <button type="button" onclick="handleDeleteAccount()" class="btn-gold" style="background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 1px solid #ff4757; flex: 1;">Hapus Akun</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
