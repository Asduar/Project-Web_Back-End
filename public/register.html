<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Memoora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 90vh;">
        <div class="modal-glass" style="display: block; width: 100%; max-width: 400px; padding: 2.5rem;">
            <h2 class="blink-gold" style="margin-bottom: 2rem; text-align: center;">Daftar Memoora</h2>
            
            <form id="registerForm" style="display: flex; flex-direction: column; gap: 1.2rem;">
                <input type="text" id="username" class="glass-input" placeholder="Username" required>
                <input type="email" id="email" class="glass-input" placeholder="Email" required>
                <input type="password" id="password" class="glass-input" placeholder="Password" required>
                
                <button type="submit" class="btn-gold blink-bg" style="width: 100%; margin-top: 1rem;">Daftar Sekarang</button>
                
                <p style="text-align: center; font-size: 0.9rem; color: var(--text-muted); margin-top: 1rem;">
                    Sudah punya akun? <a href="login.html" style="color: var(--gold-primary); text-decoration: none; font-weight: 600;">Masuk di sini</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Mengambil data dari input
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // PENGHUBUNG: Mengirim data ke API Back-End yang kamu buat
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Registrasi Berhasil! Sekarang silakan login.');
                    // PENGHUBUNG: Pindah otomatis ke halaman login jika sukses
                    window.location.href = 'login.html';
                } else {
                    alert('Gagal daftar: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Terjadi kesalahan pada server.');
            }
        });
    </script>
</body>
</html>
