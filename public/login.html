<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | Memoora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-body-tertiary d-flex align-items-center min-vh-100">

    <div class="container d-flex justify-content-center">
        <div class="card bg-dark border-secondary p-5 w-100 shadow-lg" style="max-width: 450px; border-radius: 15px;">
            <div class="text-center mb-4">
                <h1 class="fw-bold text-gold mb-1" style="font-size: 2.5rem;">Memoora</h1>
                <p class="text-secondary">Selamat datang kembali!</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold mb-1">Email</label>
                    <input type="email" id="email" class="form-control bg-dark border-secondary text-light py-2" placeholder="Masukkan email Anda" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-gold small fw-bold mb-1">Password</label>
                    <input type="password" id="password" class="form-control bg-dark border-secondary text-light py-2" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-gold fw-bold w-100 py-2 mb-3 fs-5">Masuk</button>
            </form>

            <div class="text-center mt-2">
                <p class="text-secondary small mb-0">Belum punya akun? <a href="register.html" class="text-gold text-decoration-none fw-bold">Daftar gratis</a></p>
            </div>
        </div>
    </div>

    <script>
        // Fungsi Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `memoora-toast toast-${type}`;
            toast.innerHTML = type === 'success' ? `✅ ${message}` : `❌ ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnSubmit = e.target.querySelector('button[type="submit"]');

            btnSubmit.textContent = "Memeriksa...";
            btnSubmit.disabled = true;

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showToast('Selamat datang kembali!', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showToast(data.message, 'error');
                    btnSubmit.textContent = "Masuk";
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                showToast('Terjadi kesalahan pada server.', 'error');
                btnSubmit.textContent = "Masuk";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
